<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Greeting Page</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
      background-color: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>你好 👋</h1>
<p id="message">点击按钮打招呼</p>
<button onclick="sayHello()">打招呼</button>

<script>
  function sayHello() {
    document.getElementById("message").innerText = "欢迎来到我的网站！🎉";
  }
</script>

</body>
</html>
